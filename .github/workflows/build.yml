name: Build and Release

on:
  push:
    tags: ['v*']
  workflow_dispatch:

permissions:
  contents: write

jobs:
  # ===== 前端构建（只构建一次，供后续各平台打包复用）=====
  build-frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 9
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'
      - name: Install frontend deps
        run: pnpm install --frozen-lockfile
      - name: Build frontend
        run: pnpm build
      - name: Upload frontend dist
        uses: actions/upload-artifact@v4
        with:
          name: frontend-dist
          path: server/web

  # ===== 后端构建（矩阵交叉编译多平台）=====
  build:
    needs: build-frontend
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - goos: linux
            goarch: amd64
            ext: ''
            archive: tar.gz
            artifact: familycards-linux-amd64
            filename: familycards-linux-amd64.tar.gz
          - goos: linux
            goarch: arm64
            ext: ''
            archive: tar.gz
            artifact: familycards-linux-arm64
            filename: familycards-linux-arm64.tar.gz
          - goos: windows
            goarch: amd64
            ext: .exe
            archive: zip
            artifact: familycards-windows-amd64
            filename: familycards-windows-amd64.zip
    steps:
      - uses: actions/checkout@v4
      - name: Download frontend dist
        uses: actions/download-artifact@v4
        with:
          name: frontend-dist
          path: server/web
      - uses: actions/setup-go@v5
        with:
          go-version-file: 'server/go.mod'
          cache-dependency-path: 'server/go.sum'
      - name: Run backend tests
        if: matrix.goos == 'linux' && matrix.goarch == 'amd64'
        working-directory: server
        run: go test .
      - name: Build backend
        working-directory: server
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
        run: go build -o ../familycards${{ matrix.ext }} .
      - name: Package
        run: |
          mkdir -p dist
          cp familycards${{ matrix.ext }} dist/
          cp -r server/web dist/web
          cp server/config.json dist/config.json
          if [ "${{ matrix.archive }}" = "zip" ]; then
            (cd dist && zip -r ../${{ matrix.filename }} .)
          else
            tar -czf ${{ matrix.filename }} -C dist .
          fi
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: ${{ matrix.filename }}

  # ===== 发布 Release（仅 tag 触发）=====
  release:
    needs: build
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
      - name: Flatten artifacts
        run: |
          mkdir -p release
          find artifacts -type f \( -name "*.tar.gz" -o -name "*.zip" \) -exec cp {} release/ \;
      - uses: softprops/action-gh-release@v2
        with:
          files: release/*
          generate_release_notes: true
