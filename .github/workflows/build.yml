name: Build and Release

on:
  push:
    branches: [main]
    tags: ['v*']
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # ===== 前端构建 =====
      - uses: pnpm/action-setup@v4
        with:
          version: 9
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'
      - name: Install frontend deps
        run: pnpm install --frozen-lockfile
      - name: Build frontend
        run: pnpm build

      # ===== 后端构建 =====
      - uses: actions/setup-go@v5
        with:
          go-version-file: 'server/go.mod'
          cache-dependency-path: 'server/go.sum'
      - name: Build backend
        working-directory: server
        run: go build -o ../familycards .
      - name: Run backend tests
        working-directory: server
        run: go test .

      # ===== 打包 =====
      - name: Package
        run: |
          mkdir -p dist
          cp familycards dist/
          cp -r server/web dist/web
          cp server/config.json dist/config.json
          tar -czf familycards-linux-amd64.tar.gz -C dist .

      # ===== 上传 artifact =====
      - uses: actions/upload-artifact@v4
        with:
          name: familycards-linux-amd64
          path: familycards-linux-amd64.tar.gz

      # ===== 发布 Release（仅 tag 触发）=====
      - uses: softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/tags/')
        with:
          files: familycards-linux-amd64.tar.gz
          generate_release_notes: true
